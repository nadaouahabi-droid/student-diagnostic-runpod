name: Build and Push to ghcr.io

on:
  push:
    branches: [main]        # runs every time you push to main
  workflow_dispatch:         # also lets you trigger it manually

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # becomes ghcr.io/YOUR_USERNAME/student-diagnostic-runpod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic — no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha       # caches layers between runs — rebuilds are fast
          cache-to: type=gha,mode=max
